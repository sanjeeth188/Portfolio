<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - The Gallery Cafe</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="pt-nav">
  <nav>
    <a href="index.html" class="logo">Gallery Cafe</a>
    <ul id="navbar-links"></ul>
  </nav>

  <div class="container section" style="max-width: 500px; margin-top: 5rem;">
    <div class="card" style="padding: 2.5rem;">
      <h2 style="margin-bottom: 2rem; text-align: center;">Sign In</h2>
      <p style="text-align:center; color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.9rem;">
        Demo accounts: <br>
        admin@gallerycafe.com | password123 <br>
        staff@gallerycafe.com | password123 <br>
        john@example.com | password123
      </p>
      
      <form id="login-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <p id="error-msg" style="color: var(--danger); font-size: 0.9rem; margin-bottom: 1rem; display: none;">Invalid credentials</p>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const em = document.getElementById('email').value;
      const pw = document.getElementById('password').value;
      const user = login(em, pw);
      if(user) {
        if(user.role === 'admin' || user.role === 'staff') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'index.html';
        }
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    });

    if(checkAuth()){
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
